<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>飞行影院 · 动线导览系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .header {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            min-height: 52px;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        @media (max-width: 600px) {
            .header {
                padding: 6px 8px;
                justify-content: center;
            }
            .header-title h1 {
                font-size: 0.9rem !important;
            }
            .floor-tab {
                padding: 4px 10px !important;
                font-size: 0.75rem !important;
            }
            .tool-btn {
                padding: 4px 8px !important;
                font-size: 0.7rem !important;
            }
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-title h1 { font-size: 1.1rem; }
        .header-title .icon { font-size: 1.1rem; }
        
        .floor-tabs {
            display: flex;
            gap: 3px;
        }
        .floor-tab {
            padding: 6px 14px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #a0a0a0;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .floor-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .floor-tab.active { background: linear-gradient(135deg, #e94560, #c23a51); color: #fff; }
        
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .tool-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .tool-btn.active { background: rgba(233,69,96,0.3); border-color: #e94560; color: #fff; }
        
        .color-picker {
            display: flex;
            gap: 3px;
        }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.active { border-color: #fff; }
        
        .main-content { flex: 1; display: flex; min-height: 0; }
        
        .canvas-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0f0f1a;
        }
        
        .zoom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
        }
        .zoom-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(22, 33, 62, 0.9);
            color: #fff;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:hover { background: rgba(233,69,96,0.8); }
        
        .map-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        
        .map-viewport * {
            touch-action: none;
        }
        
        .canvas-container {
            position: relative;
            transform-origin: center center;
            transition: transform 0.05s linear;
        }
        
        .floor-image { display: block; max-width: none; }
        
        #drawCanvas {
            position: absolute;
            top: 0; left: 0;
        }
        
        .person-marker {
            position: absolute;
            width: 36px;
            height: 50px;
            transform: translate(-50%, -100%);
            cursor: grab;
            z-index: 100;
            filter: drop-shadow(0 3px 10px rgba(233, 69, 96, 0.7));
            display: none;
        }
        .person-marker.visible { display: block; }
        .person-marker:active { cursor: grabbing; transform: translate(-50%, -100%) scale(1.1); }
        .person-marker svg { width: 100%; height: 100%; }
        
        .marker-pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #e94560;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -30%);
            animation: pulse-ring 1.5s infinite;
            pointer-events: none;
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -30%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -30%) scale(2); opacity: 0; }
        }
        
        .info-panel {
            width: 200px;
            background: #16213e;
            padding: 10px;
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column !important;
            }
            .info-panel {
                width: 100% !important;
                height: auto !important;
                max-height: 140px !important;
                border-left: none !important;
                border-top: 1px solid rgba(255,255,255,0.1);
                flex-direction: row !important;
                flex-wrap: wrap !important;
                overflow-x: hidden !important;
                justify-content: flex-start;
                gap: 4px;
            }
            .info-card {
                min-width: 60px !important;
                max-width: 80px !important;
                flex: 0 0 auto !important;
                padding: 4px !important;
            }
            .info-card-title {
                font-size: 0.45rem !important;
                margin-bottom: 2px !important;
            }
            .info-card-value {
                font-size: 0.6rem !important;
            }
            .action-btn {
                padding: 4px 6px !important;
                font-size: 0.6rem !important;
                min-width: 50px !important;
                max-width: 70px !important;
                flex: 0 0 auto !important;
                white-space: nowrap;
            }
            .mobile-full-row {
                flex-basis: 100% !important;
                min-width: 100% !important;
                max-width: 100% !important;
                text-align: left !important;
            }
            .mobile-full-row .tips {
                display: flex !important;
                flex-wrap: wrap !important;
                gap: 4px 8px !important;
                padding: 0 !important;
            }
            .mobile-full-row .tips li {
                display: inline !important;
                white-space: nowrap !important;
                font-size: 0.45rem !important;
                margin: 0 !important;
            }
            .floor-tabs {
                flex-wrap: wrap !important;
            }
            .toolbar {
                flex-wrap: wrap !important;
            }
        }
        
        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .info-card-title {
            font-size: 0.6rem;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .info-card-value { font-size: 1rem; font-weight: bold; }
        
        .action-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-toggle { background: #6c757d; color: #fff; }
        .btn-toggle:hover { background: #5a6268; }
        .btn-toggle.active { background: #e94560; }
        .btn-clear { background: #dc3545; color: #fff; }
        .btn-clear:hover { background: #c82333; }
        .btn-download { background: #28a745; color: #fff; }
        .btn-download:hover { background: #218838; }
        
        .tips { font-size: 0.65rem; color: #666; line-height: 1.5; }
        .tips li { margin-bottom: 3px; }
        
        .footer {
            background: #16213e;
            padding: 5px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.6rem;
            color: #555;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            height: 26px;
        }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(233,69,96,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #888; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载楼层图中...</div>
    </div>
    
    <div class="header">
        <div class="header-title">
            <span class="icon">🎬</span>
            <h1>飞行影院 · 动线导览</h1>
        </div>
        
        <div class="floor-tabs">
            <button class="floor-tab" data-floor="1" onclick="switchFloor(1)">1F</button>
            <button class="floor-tab" data-floor="2" onclick="switchFloor(2)">2F</button>
            <button class="floor-tab" data-floor="3" onclick="switchFloor(3)">3F</button>
            <button class="floor-tab" data-floor="4" onclick="switchFloor(4)">4F</button>
            <button class="floor-tab active" data-floor="5" onclick="switchFloor(5)">5F</button>
        </div>
        
        <div class="toolbar">
            <button class="tool-btn" id="btnHand" onclick="setTool('hand')">✋ 手掌</button>
            <button class="tool-btn" id="btnDraw" onclick="setTool('draw')">✏️ 画笔</button>
            <div class="color-picker">
                <div class="color-dot active" style="background:#e94560" data-color="#e94560" onclick="setColor('#e94560')"></div>
                <div class="color-dot" style="background:#4fc3f7" data-color="#4fc3f7" onclick="setColor('#4fc3f7')"></div>
                <div class="color-dot" style="background:#ffd700" data-color="#ffd700" onclick="setColor('#ffd700')"></div>
                <div class="color-dot" style="background:#00ff00" data-color="#00ff00" onclick="setColor('#00ff00')"></div>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="canvas-section">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <button class="zoom-btn" onclick="resetView()" title="重置">↺</button>
            </div>
            
            <div class="map-viewport" id="mapViewport">
                <div class="canvas-container" id="canvasContainer">
                    <img class="floor-image" id="floorImage" alt="">
                    <canvas id="drawCanvas"></canvas>
                    <div class="person-marker" id="personMarker">
                        <div class="marker-pulse"></div>
                        <svg viewBox="0 0 50 70" fill="none">
                            <circle cx="25" cy="12" r="10" fill="#e94560" stroke="#fff" stroke-width="2"/>
                            <path d="M25 22 L25 48" stroke="#e94560" stroke-width="6" stroke-linecap="round"/>
                            <path d="M10 32 L25 28 L40 32" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
                            <path d="M25 48 L15 68" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
                            <path d="M25 48 L35 68" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-card">
                <div class="info-card-title">当前位置</div>
                <div class="info-card-value" id="locationName">5F - 主入口层</div>
            </div>
            
            <div class="info-card">
                <div class="info-card-title">缩放</div>
                <div class="info-card-value" id="zoomLevel" style="font-size:0.9rem">100%</div>
            </div>
            
            <button class="action-btn btn-toggle" id="btnToggleMarker" onclick="toggleMarker()">📍 显示定位</button>
            <button class="action-btn btn-clear" onclick="clearDrawing()">🗑️ 清除标记</button>
            <button class="action-btn btn-download" onclick="downloadCanvas()">💾 保存图片</button>
            
            <div class="info-card mobile-full-row">
                <div class="info-card-title">操作说明</div>
                <ul class="tips">
                    <li>✋ 手掌模式拖动底图</li>
                    <li>✏️ 画笔模式标注</li>
                    <li>📍 拖动红点定位</li>
                    <li>+/− 缩放 · 滚轮也行</li>
                    <li>⌨️ 1-5 切换楼层</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <span>飞行影院动线导览系统</span>
        <span>CSS工程设备部 王家贤 · V2.0 · 2026-06-23</span>
    </div>

        const container = document.getElementById('canvasContainer');
        const floorImage = document.getElementById('floorImage');
        const drawCanvas = document.getElementById('drawCanvas');
        const ctx = drawCanvas.getContext('2d');
        const personMarker = document.getElementById('personMarker');
        const viewport = document.getElementById('mapViewport');
        
        function init() {
            setTool('hand');
            loadFloor(5);
            setupWheelZoom();
        }
        
        function loadFloor(floor) {
            currentFloor = floor;
            document.querySelectorAll('.floor-tab').forEach(t => t.classList.toggle('active', +t.dataset.floor === floor));
            document.getElementById('locationName').textContent = `${floor}F - ${floorNames[floor]}`;
            
            floorImage.src = floorImages[floor];
            floorImage.onload = () => {
                document.getElementById('loading').style.display = 'none';
                drawCanvas.width = floorImage.offsetWidth;
                drawCanvas.height = floorImage.offsetHeight;
                resetView();
                if (markerVisible) setMarkerPosition(floorImage.offsetWidth/2, floorImage.offsetHeight/2);
            };
        }
        
        function switchFloor(f) { if (f !== currentFloor) loadFloor(f); }
        
        function resetView() {
            zoom = 1; panX = 0; panY = 0;
            applyTransform();
            document.getElementById('zoomLevel').textContent = '100%';
        }
        
        function applyTransform() {
            container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }
        
        function zoomIn() { zoom = Math.min(zoom + 0.25, 3); applyTransform(); document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%'; }
        function zoomOut() { zoom = Math.max(zoom - 0.25, 0.25); applyTransform(); document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%'; }
        
        let lastTouchDist = 0;
        let touchStartPos = null;
        
        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx*dx + dy*dy);
        }
        
        function setupWheelZoom() {
            viewport.addEventListener('wheel', e => {
                e.preventDefault();
                zoom = Math.max(0.25, Math.min(3, zoom - e.deltaY * 0.001));
                applyTransform();
                document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%';
            });
            
            // Touch pinch zoom
            container.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    lastTouchDist = getTouchDistance(e.touches);
                } else if (e.touches.length === 1 && currentTool === 'hand') {
                    isPanning = true;
                    lastX = e.touches[0].clientX;
                    lastY = e.touches[0].clientY;
                    container.style.cursor = 'grabbing';
                }
            }, {passive: false});
            
            container.addEventListener('touchmove', e => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dist = getTouchDistance(e.touches);
                    if (lastTouchDist > 0) {
                        const scale = dist / lastTouchDist;
                        zoom = Math.max(0.25, Math.min(3, zoom * scale));
                        applyTransform();
                        document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%';
                    }
                    lastTouchDist = dist;
                } else if (e.touches.length === 1 && isPanning && currentTool === 'hand') {
                    e.preventDefault();
                    panX += e.touches[0].clientX - lastX;
                    panY += e.touches[0].clientY - lastY;
                    lastX = e.touches[0].clientX;
                    lastY = e.touches[0].clientY;
                    applyTransform();
                }
            }, {passive: false});
            
            container.addEventListener('touchend', e => {
                if (e.touches.length < 2) lastTouchDist = 0;
                if (e.touches.length < 1) isPanning = false;
            });
        }
        
        function toggleMarker() {
            markerVisible = !markerVisible;
            personMarker.classList.toggle('visible', markerVisible);
            document.getElementById('btnToggleMarker').classList.toggle('active', markerVisible);
            document.getElementById('btnToggleMarker').textContent = markerVisible ? '📍 隐藏定位' : '📍 显示定位';
            if (markerVisible) setMarkerPosition(floorImage.offsetWidth/2, floorImage.offsetHeight/2);
        }
        
        function setMarkerPosition(x, y) {
            markerPos = {x, y};
            personMarker.style.left = x + 'px';
            personMarker.style.top = y + 'px';
        }
        
        function setTool(tool) {
            currentTool = tool;
            document.getElementById('btnHand').classList.toggle('active', tool === 'hand');
            document.getElementById('btnDraw').classList.toggle('active', tool === 'draw');
            personMarker.style.cursor = 'grab';
            drawCanvas.style.cursor = tool === 'draw' ? 'crosshair' : (tool === 'hand' ? 'grab' : 'default');
        }
        
        function setColor(c) {
            currentColor = c;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('active', d.dataset.color === c));
        }
        
        function clearDrawing() { ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }
        
        function downloadCanvas() {
            const c = document.createElement('canvas');
            c.width = floorImage.naturalWidth || floorImage.offsetWidth;
            c.height = floorImage.naturalHeight || floorImage.offsetHeight;
            const cx = c.getContext('2d');
            cx.drawImage(floorImage, 0, 0, c.width, c.height);
            if (drawCanvas.width > 0) cx.drawImage(drawCanvas, 0, 0, c.width, c.height);
            
            function doDownload() {
                const a = document.createElement('a');
                a.download = `飞行影院_${currentFloor}F_导览图.png`;
                a.href = c.toDataURL('image/png');
                a.click();
            }
            
            if (markerVisible) {
                const svgStr = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 70"><circle cx="25" cy="12" r="10" fill="#e94560" stroke="#fff" stroke-width="2"/><path d="M25 22 L25 48" stroke="#e94560" stroke-width="6" stroke-linecap="round"/><path d="M10 32 L25 28 L40 32" stroke="#e94560" stroke-width="5" stroke-linecap="round"/><path d="M25 48 L15 68" stroke="#e94560" stroke-width="5" stroke-linecap="round"/><path d="M25 48 L35 68" stroke="#e94560" stroke-width="5" stroke-linecap="round"/></svg>';
                const img = new Image();
                img.onload = function() {
                    cx.drawImage(img, markerPos.x - 18, markerPos.y - 50, 36, 50);
                    doDownload();
                };
                img.src = 'data:image/svg+xml;base64,' + btoa(svgStr);
            } else {
                doDownload();
            }
        }
        
        
        
        // 手掌拖动底图
        container.addEventListener('mousedown', e => {
            if (e.target === personMarker || personMarker.contains(e.target)) return;
            
            if (currentTool === 'hand' && !isDrawing) {
                isPanning = true;
                lastX = e.clientX;
                lastY = e.clientY;
                container.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });
        
        // 人形拖动 - 鼠标
        personMarker.addEventListener('mousedown', e => {
            if (!markerVisible) return;
            e.preventDefault();
            e.stopPropagation();
            
            const onMove = me => {
                const rect = floorImage.getBoundingClientRect();
                const sx = (me.clientX - rect.left) / zoom;
                const sy = (me.clientY - rect.top) / zoom;
                setMarkerPosition(
                    Math.max(18, Math.min(sx, floorImage.offsetWidth - 18)),
                    Math.max(25, Math.min(sy, floorImage.offsetHeight - 6))
                );
            };
            const onUp = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        
        // 人形拖动 - 触摸屏
        personMarker.addEventListener('touchstart', e => {
            if (!markerVisible) return;
            e.preventDefault();
            e.stopPropagation();
            
            const onMove = me => {
                if (!me.touches || me.touches.length === 0) return;
                const rect = floorImage.getBoundingClientRect();
                const sx = (me.touches[0].clientX - rect.left) / zoom;
                const sy = (me.touches[0].clientY - rect.top) / zoom;
                setMarkerPosition(
                    Math.max(18, Math.min(sx, floorImage.offsetWidth - 18)),
                    Math.max(25, Math.min(sy, floorImage.offsetHeight - 6))
                );
            };
            const onEnd = () => {
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            };
            document.addEventListener('touchmove', onMove, {passive: false});
            document.addEventListener('touchend', onEnd);
        }, {passive: false});
        
        document.addEventListener('mousemove', e => {
            if (!isPanning) return;
            panX += e.clientX - lastX;
            panY += e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;
            applyTransform();
        });
        
        document.addEventListener('mouseup', () => {
            isPanning = false;
            container.style.cursor = 'grab';
        });
        
        // 画笔 - 鼠标
        drawCanvas.addEventListener('mousedown', e => {
            if (currentTool !== 'draw') return;
            isDrawing = true;
            const rect = drawCanvas.getBoundingClientRect();
            lastX = (e.clientX - rect.left) / zoom;
            lastY = (e.clientY - rect.top) / zoom;
        });
        
        drawCanvas.addEventListener('mousemove', e => {
            if (!isDrawing || currentTool !== 'draw') return;
            const rect = drawCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;
            ctx.beginPath();
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x; lastY = y;
        });
        
        drawCanvas.addEventListener('mouseup', () => isDrawing = false);
        drawCanvas.addEventListener('mouseleave', () => isDrawing = false);
        
        // 画笔 - 触摸屏
        drawCanvas.addEventListener('touchstart', e => {
            if (currentTool !== 'draw') return;
            e.preventDefault();
            isDrawing = true;
            const rect = drawCanvas.getBoundingClientRect();
            lastX = (e.touches[0].clientX - rect.left) / zoom;
            lastY = (e.touches[0].clientY - rect.top) / zoom;
        }, {passive: false});
        
        drawCanvas.addEventListener('touchmove', e => {
            if (!isDrawing || currentTool !== 'draw') return;
            e.preventDefault();
            const rect = drawCanvas.getBoundingClientRect();
            const x = (e.touches[0].clientX - rect.left) / zoom;
            const y = (e.touches[0].clientY - rect.top) / zoom;
            ctx.beginPath();
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x; lastY = y;
        }, {passive: false});
        
        drawCanvas.addEventListener('touchend', () => isDrawing = false);
        drawCanvas.addEventListener('touchcancel', () => isDrawing = false);
        
        // 键盘
        document.addEventListener('keydown', e => {
            if (e.key >= '1' && e.key <= '5') switchFloor(+e.key);
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-') zoomOut();
            if (e.key === 'r' || e.key === 'R') resetView();
        });
        
        init();
    </script>
</body>
</html>
